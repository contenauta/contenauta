<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contenauta</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F4F0; --surface: #FFFFFF; --surface2: #EDEBE7;
  --border: rgba(0,0,0,0.08); --accent-red: #E03A1E; --accent-orange: #F5892A;
  --slate: #8a9aaa; --text-primary: #1a1a18; --text-secondary: #5a5750; --text-muted: #a8a49e;
}
body { font-family: "Lora", Georgia, serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }
.app { display: flex; flex-direction: column; min-height: 100vh; max-width: 760px; margin: 0 auto; }

/* ── HEADER ── */
.header { padding: 15px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.logo { display: flex; align-items: center; gap: 11px; }
.logo-icon { width: 34px; height: 34px; flex-shrink: 0; object-fit: contain; }
.logo-wordmark { font-family: "Rubik Mono One", monospace; font-size: 16px; letter-spacing: 0.14em; background: linear-gradient(90deg, var(--accent-red) 0%, var(--accent-orange) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-transform: uppercase; }
.step-bar { display: flex; gap: 5px; align-items: center; }
.step-pip { width: 22px; height: 3px; border-radius: 2px; background: var(--surface2); transition: all 0.4s; }
.step-pip.active { background: linear-gradient(90deg, var(--accent-red), var(--accent-orange)); }
.step-pip.done { background: rgba(240,120,60,0.3); }
.step-label { font-family: "Rubik Mono One", monospace; font-size: 9px; color: var(--text-muted); margin-left: 8px; letter-spacing: 0.1em; text-transform: uppercase; min-width: 20px; }
.step-label.lit { color: var(--accent-orange); }
.reset-btn { font-family: "Rubik Mono One", monospace; font-size: 9px; color: var(--text-muted); background: none; border: none; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 8px; transition: color 0.2s; }
.reset-btn:hover { color: var(--text-secondary); }

/* ── WIZARD ── */
.view { flex: 1; overflow-y: auto; padding: 36px 28px 28px; display: flex; flex-direction: column; }
.view::-webkit-scrollbar { width: 3px; }
.view::-webkit-scrollbar-thumb { background: var(--surface2); }

.step-head { margin-bottom: 30px; }
.step-head h2 { font-family: "Lora", serif; font-size: 22px; font-weight: 400; color: var(--text-primary); margin-bottom: 5px; }
.step-head p { font-family: "Lora", serif; font-size: 13px; color: var(--text-secondary); font-style: italic; }

.field { margin-bottom: 22px; }
.field label { display: block; font-family: "Lora", serif; font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; font-style: italic; }
.field input[type=text], .field textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 15px; color: var(--text-primary); font-family: "Lora", serif; font-size: 14px;
  outline: none; transition: border-color 0.2s; resize: vertical;
}
.field input[type=text]:focus, .field textarea:focus { border-color: rgba(224,58,30,0.35); }
.field input[type=text]::placeholder, .field textarea::placeholder { color: var(--text-muted); font-style: italic; }
.field textarea { min-height: 80px; line-height: 1.6; }

.radio-group { display: flex; flex-direction: column; gap: 8px; }
.radio-opt { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; cursor: pointer; transition: border-color 0.2s; }
.radio-opt:hover { border-color: rgba(240,120,60,0.2); }
.radio-opt.selected { border-color: rgba(224,58,30,0.45); background: rgba(224,58,30,0.05); }
.radio-opt input { display: none; }
.radio-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--surface2); flex-shrink: 0; transition: all 0.2s; }
.radio-opt.selected .radio-dot { border-color: var(--accent-orange); background: var(--accent-orange); }
.radio-opt span { font-family: "Lora", serif; font-size: 13px; color: var(--text-secondary); }
.radio-opt.selected span { color: var(--text-primary); }

.pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
.pill { padding: 7px 14px; border: 1px solid var(--border); border-radius: 20px; font-family: "Rubik Mono One", monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
.pill:hover { border-color: rgba(240,120,60,0.3); color: var(--text-secondary); }
.pill.selected { border-color: var(--accent-orange); background: rgba(240,120,60,0.08); color: var(--accent-orange); }

.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 28px; border-top: 1px solid var(--border); }
.btn-back { font-family: "Rubik Mono One", monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); background: none; border: none; cursor: pointer; padding: 10px 0; transition: color 0.2s; }
.btn-back:hover { color: var(--text-secondary); }
.btn-next { padding: 12px 32px; background: linear-gradient(135deg, var(--accent-red), var(--accent-orange)); border: none; color: white; border-radius: 9px; font-family: "Rubik Mono One", monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.btn-next:hover { opacity: 0.86; transform: translateY(-1px); }
.btn-next:active { transform: scale(0.97); }

/* ── WELCOME ── */
.welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 16px; padding: 40px 24px; }
.welcome-compass { width: 72px; height: 72px; object-fit: contain; }
.welcome-tag { font-family: "Rubik Mono One", monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; background: linear-gradient(90deg, var(--accent-red), var(--accent-orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.welcome h2 { font-family: "Lora", serif; font-size: 22px; font-weight: 400; color: var(--text-primary); max-width: 360px; line-height: 1.4; }
.welcome p { font-family: "Lora", serif; font-size: 14px; color: var(--text-secondary); max-width: 320px; line-height: 1.75; font-style: italic; }
.btn-start { margin-top: 6px; padding: 13px 34px; background: linear-gradient(135deg, var(--accent-red), var(--accent-orange)); border: none; color: white; border-radius: 9px; font-family: "Rubik Mono One", monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.btn-start:hover { opacity: 0.86; transform: translateY(-1px); }

/* ── LOADING ── */
.loading { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; }
.loading-dots { display: flex; gap: 7px; }
.loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); animation: dotBounce 1.3s infinite; }
.loading-dots span:nth-child(2) { animation-delay: 0.18s; }
.loading-dots span:nth-child(3) { animation-delay: 0.36s; }
@keyframes dotBounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-7px); opacity: 1; background: var(--accent-orange); } }
.loading-msg { font-family: "Lora", serif; font-size: 14px; color: var(--text-secondary); font-style: italic; }

/* ── RESULTS ── */
.results { flex: 1; overflow-y: auto; padding: 32px 28px 40px; display: flex; flex-direction: column; gap: 36px; }
.results::-webkit-scrollbar { width: 3px; }
.results::-webkit-scrollbar-thumb { background: var(--surface2); }
.results-section { display: flex; flex-direction: column; gap: 12px; }
.section-title { font-family: "Rubik Mono One", monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent-orange); opacity: 0.8; }
.scheda-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; font-family: "Lora", serif; font-size: 14px; color: var(--text-secondary); line-height: 1.75; }
.pillars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.pillar-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.pillar-name { font-family: "Rubik Mono One", monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.pillar-desc { font-family: "Lora", serif; font-size: 12px; color: var(--text-secondary); line-height: 1.55; font-style: italic; }
.pillar-card:nth-child(6n+1) .pillar-name { color: #c4a8f0; }
.pillar-card:nth-child(6n+2) .pillar-name { color: #80d4a8; }
.pillar-card:nth-child(6n+3) .pillar-name { color: #7ab8e0; }
.pillar-card:nth-child(6n+4) .pillar-name { color: #e08878; }
.pillar-card:nth-child(6n+5) .pillar-name { color: #f0b870; }
.pillar-card:nth-child(6n+6) .pillar-name { color: #a8c8a0; }

/* ── MATRIX & CALENDAR ── */
.table-wrap { overflow-x: auto; }
.matrix-table, .calendar-table { border-collapse: separate; border-spacing: 5px; min-width: 480px; }
.matrix-table th, .calendar-table th {
  font-family: "Rubik Mono One", monospace; font-size: 9px; letter-spacing: 0.1em;
  color: var(--text-muted); padding: 4px 8px; text-align: center; font-weight: 400; text-transform: uppercase; white-space: nowrap;
}
.row-label { font-family: "Lora", serif; font-size: 12px; color: var(--text-secondary); padding: 4px 14px 4px 0; white-space: nowrap; vertical-align: middle; }
.row-label-inner { display: flex; align-items: center; gap: 7px; }
.row-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.week-label { font-family: "Rubik Mono One", monospace; font-size: 9px; letter-spacing: 0.1em; color: var(--text-muted); padding: 4px 14px 4px 0; white-space: nowrap; vertical-align: middle; text-transform: uppercase; }
.m-cell { padding: 9px 11px; border-radius: 9px; vertical-align: top; min-width: 110px; max-width: 155px; }
.m-badge { display: inline-block; font-family: "Rubik Mono One", monospace; font-size: 8px; letter-spacing: 0.12em; padding: 2px 6px; border-radius: 4px; margin-bottom: 5px; }
.m-sub { font-family: "Lora", serif; font-size: 10px; color: var(--text-muted); margin-bottom: 3px; font-style: italic; }
.m-title { font-family: "Lora", serif; font-size: 12px; line-height: 1.4; }
.c-pos  { background: #ede8f8; } .c-pos  .m-badge { background: #d8cff0; color: #6b52b8; } .c-pos  .m-title { color: #3d2d80; }
.c-aut  { background: #e4f5ec; } .c-aut  .m-badge { background: #c8ebd8; color: #2a7a52; } .c-aut  .m-title { color: #1a5c3a; }
.c-edu  { background: #e4eff8; } .c-edu  .m-badge { background: #c8dff0; color: #2a6a9a; } .c-edu  .m-title { color: #1a4a72; }
.c-conv { background: #fceae7; } .c-conv .m-badge { background: #f8d0c8; color: #b83020; } .c-conv .m-title { color: #8a2018; }
.cal-nota {
  font-family: "Lora", serif; font-size: 13px; color: var(--text-secondary);
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 11px 15px; margin-bottom: 10px; line-height: 1.65; font-style: italic;
}
.results-footer { display: flex; justify-content: center; padding-top: 8px; }

  /* ── POST DEV ── */
  .post-dev-section { border-top: 2px solid var(--border); padding-top: 32px; }
  .post-dev-intro { font-family: "Lora", serif; font-size: 14px; color: var(--text-secondary); font-style: italic; margin-bottom: 20px; line-height: 1.7; }
  .post-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .post-chip {
    padding: 8px 14px; border: 1px solid var(--border); border-radius: 20px;
    font-family: "Lora", serif; font-size: 12px; color: var(--text-secondary);
    cursor: pointer; transition: all 0.2s; background: var(--surface); line-height: 1.35;
    text-align: left; max-width: 260px;
  }
  .post-chip:hover { border-color: var(--accent-orange); color: var(--text-primary); }
  .post-chip.selected { border-color: var(--accent-orange); background: rgba(245,137,42,0.07); color: var(--text-primary); }
  .post-chip-badge { font-family: "Rubik Mono One", monospace; font-size: 8px; letter-spacing: 0.1em; display: block; margin-bottom: 3px; }
  .post-options { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .post-option-group { display: flex; flex-direction: column; gap: 6px; }
  .post-option-group label { font-family: "Rubik Mono One", monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
  .post-option-group select {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; color: var(--text-primary); font-family: "Lora", serif; font-size: 13px;
    outline: none; cursor: pointer;
  }
  .btn-generate-post {
    padding: 11px 28px; background: linear-gradient(135deg, var(--accent-red), var(--accent-orange));
    border: none; color: white; border-radius: 9px; font-family: "Rubik Mono One", monospace;
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
    transition: all 0.2s; margin-bottom: 24px;
  }
  .btn-generate-post:hover { opacity: 0.86; transform: translateY(-1px); }
  .btn-generate-post:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .post-output {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 22px 24px; font-family: "Lora", serif; font-size: 14px; line-height: 1.85;
    color: var(--text-primary); white-space: pre-wrap; position: relative;
  }
  .post-output-label { font-family: "Rubik Mono One", monospace; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent-orange); margin-bottom: 12px; }
  .copy-btn {
    position: absolute; top: 16px; right: 16px;
    font-family: "Rubik Mono One", monospace; font-size: 9px; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 6px 12px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text-muted); border-radius: 6px; cursor: pointer;
    transition: all 0.2s;
  }
  .copy-btn:hover { color: var(--text-primary); border-color: var(--accent-orange); }
  .post-loading { display: flex; align-items: center; gap: 10px; color: var(--text-muted); font-family: "Lora", serif; font-size: 13px; font-style: italic; padding: 16px 0; }

/* ── FILE UPLOAD ── */
.file-upload-area {
  width: 100%; background: var(--surface); border: 1.5px dashed var(--border);
  border-radius: 10px; padding: 18px 15px; cursor: pointer; transition: border-color 0.2s;
  display: flex; align-items: center; gap: 12px;
}
.file-upload-area:hover { border-color: rgba(240,120,60,0.35); }
.file-upload-area.has-file { border-style: solid; border-color: rgba(224,58,30,0.35); background: rgba(224,58,30,0.03); }
.file-upload-icon { font-size: 20px; flex-shrink: 0; }
.file-upload-text { font-family: "Lora", serif; font-size: 13px; color: var(--text-muted); font-style: italic; }
.file-upload-text strong { color: var(--text-secondary); font-weight: 400; font-style: normal; }
.file-upload-input { display: none; }

/* ── CSV REMINDER ── */
.csv-reminder {
  display: flex; align-items: center; gap: 12px;
  background: rgba(245,137,42,0.08); border: 1px solid rgba(245,137,42,0.25);
  border-radius: 10px; padding: 14px 18px; margin-bottom: 12px;
}
.csv-reminder-icon { font-size: 18px; flex-shrink: 0; }
.csv-reminder-text { font-family: "Lora", serif; font-size: 13px; color: var(--text-secondary); font-style: italic; flex: 1; line-height: 1.5; }

/* ── MONTH TABS ── */
.months-nav { display: flex; align-items: center; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
.month-tab {
  padding: 7px 16px; border-radius: 20px; font-family: "Rubik Mono One", monospace;
  font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;
  border: 1.5px solid var(--border); background: var(--surface); color: var(--text-muted);
  transition: all 0.2s;
}
.month-tab:hover { border-color: rgba(240,120,60,0.3); color: var(--text-secondary); }
.month-tab.active { background: linear-gradient(135deg, var(--accent-red), var(--accent-orange)); border-color: transparent; color: white; }
.month-panel { display: none; }
.month-panel.active { display: block; }

/* ── NEXT MONTH ── */
.next-month-section { border-top: 1px solid var(--border); padding-top: 28px; display: flex; flex-direction: column; gap: 14px; }
.btn-next-month {
  align-self: flex-start; padding: 12px 28px; background: var(--surface);
  border: 1.5px solid rgba(224,58,30,0.35); color: var(--accent-red); border-radius: 9px;
  font-family: "Rubik Mono One", monospace; font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase; cursor: pointer; transition: all 0.2s;
}
.btn-next-month:hover { background: rgba(224,58,30,0.05); border-color: var(--accent-red); }
.btn-next-month:disabled { opacity: 0.4; cursor: not-allowed; }
.next-month-cal { margin-top: 8px; }
.next-month-label { font-family: "Rubik Mono One", monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent-orange); opacity: 0.8; margin-bottom: 10px; }

/* ── COMPETITOR STATUS ── */
.competitor-status { font-family: "Lora", serif; font-size: 12px; color: var(--text-muted); font-style: italic; margin-top: 6px; }

/* ── PILLS2 (max 2 selezioni) ── */
.pills2-group { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.pills2-opt { padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-family: "Lora", serif; font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; background: var(--surface); line-height: 1.35; }
.pills2-opt:hover { border-color: rgba(240,120,60,0.3); }
.pills2-opt.selected { border-color: var(--accent-orange); background: rgba(245,137,42,0.07); color: var(--text-primary); }
.pills2-opt.disabled { opacity: 0.4; cursor: not-allowed; }
.field-sublabel { font-family: "Rubik Mono One", monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; display: block; }

/* ── EXPORT ── */
.export-row { display: flex; gap: 10px; margin-top: 4px; flex-wrap: wrap; }
.btn-export { display: flex; align-items: center; gap: 7px; padding: 9px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; font-family: "Rubik Mono One", monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; }
.btn-export:hover { border-color: var(--accent-orange); color: var(--accent-orange); }
.btn-export svg { flex-shrink: 0; }

</style>
</head>
<body>
<div class="app" id="app">

<script>
// ── STEPS CONFIG ────────────────────────────────────────────────────────────
const STEPS = [
  {
    title: "L'attività",
    sub: "Partiamo dalle basi.",
    fields: [
      { id:"nome",    label:"Come si chiama?",              type:"text", ph:"Nome dell'attività" },
      { id:"settore", label:"Di cosa ti occupi?",           type:"area", ph:"Settore, prodotti o servizi principali..." },

      { id:"citta",   label:"Città o area di riferimento",  type:"text", ph:"es. Milano, tutta Italia..." },
      { id:"materiali", label:"Hai testi, brochure o descrizioni dei tuoi servizi da condividere? Più contesto dai, più la strategia sarà precisa.", type:"file", opt:true },
    ]
  },
  {
    title: "Social e voce",
    sub: "Come comunica e con che tono.",
    fields: [
      { id:"piattaforme", label:"Su quali social sei già presente, o vorresti esserlo?", type:"pills", opts:["Instagram","LinkedIn","TikTok","Facebook","YouTube","Twitter/X"] },
      { id:"chi_parla",   label:"Chi pubblicherà i contenuti?",       type:"radio", opts:["Io in prima persona","Un collaboratore","Entrambi","Non lo so ancora"] },
      { id:"tono",        label:"Cosa vorresti che pensasse chi ti segue?", type:"area", ph:'es. "Questa persona sa quello che fa, ma riesce a spiegarlo in modo semplice"' },
      { id:"evitare",     label:"Argomenti da evitare",        type:"area", ph:"Temi sensibili, concorrenti da non citare...", opt:true },
    ]
  },
  {
    title: "Pubblico e mercato",
    sub: "Chi sono le persone che vuoi raggiungere.",
    fields: [
      { id:"obiezioni",     label:"Quali obiezioni senti più spesso?",                                        type:"area", ph:'"Costa troppo", "Non ho tempo"...' },
      { id:"comp_stile",    label:"Come comunicano di solito quelli che fanno il tuo stesso lavoro?",          type:"area", ph:'es. "Sono tutti molto tecnici, pieni di paroloni, sembrano parlare tra di loro"', opt:true },
      { id:"comp_bene",     label:"Cosa ti piace di chi, nel tuo settore, comunica bene?",                    type:"area", ph:'es. "Spiega le cose in modo semplice, senza sembrare arrogante, e la gente lo capisce subito"', opt:true },
      { id:"comp_fastidio", label:"Cosa ti dà fastidio di come comunica il tuo settore?",                     type:"area", ph:'es. "Tutti parlano solo di sé, nessuno parla davvero dei problemi delle persone"', opt:true },
      { id:"forza",         label:"Cosa ti distingue davvero da chi fa il tuo stesso lavoro?",               type:"area", ph:"Punti di forza, elementi unici..." },
      { id:"percezioni", label:"Cosa vorresti cambiare nella percezione del pubblico?", type:"area", ph:"Stereotipi, pregiudizi, malintesi...", opt:true },
      { id:"fiducia",    label:"Livello di fiducia del pubblico attuale",               type:"radio", opts:["Basso — non mi conosce ancora","Medio — sa chi sono ma non si fida del tutto","Alto — ho già un pubblico fidelizzato"] },
    ]
  },
  {
    title: "Obiettivi",
    sub: "Cosa vuoi ottenere con i contenuti.",
    fields: [
      { id:"priorita", label:"Cosa vuoi ottenere con i social?", sublabel:"Scegli uno o due obiettivi.", type:"pills2", opts:["Costruire autorevolezza","Vendere","Educare il pubblico","Costruire fiducia e relazione"] },
      { id:"crescita", label:"Obiettivo di crescita",            type:"area", ph:'es. "generare 10 contatti al mese", "raddoppiare i follower in 6 mesi"' },
      { id:"note",     label:"Altro che vuoi aggiungere",        type:"area", ph:"Qualsiasi altra informazione utile...", opt:true },
    ]
  }
];

// ── STATE ───────────────────────────────────────────────────────────────────
let step = 0;
const formData = {};
const fileData = {}; // {id: {data, mediaType, name}}
const loadingMsgs = ['Analizzo i dati...','Definisco i pilastri...','Costruisco la matrice...','Preparo il calendario...'];
let loadingTimer;
let calendarHistory = []; // stores previous calendars for next month generation

// ── STEP BAR ────────────────────────────────────────────────────────────────
function updateStepBar(s) {
  document.querySelectorAll('.step-pip').forEach((p,i) => {
    p.className = 'step-pip' + (i < s ? ' done' : i === s ? ' active' : '');
  });
  const lbl = document.getElementById('stepLabel');
  lbl.textContent = (s+1) + ' / 4';
  lbl.className = 'step-label lit';
}

// ── FIELD RENDERING ─────────────────────────────────────────────────────────
function renderFields(fields) {
  const container = document.getElementById('stepFields');
  container.innerHTML = '';
  for (const f of fields) {
    const div = document.createElement('div');
    div.className = 'field';
    const opt = f.opt ? ' <span style="color:var(--text-muted);font-size:11px">(facoltativo)</span>' : '';
    div.innerHTML = `<label>${f.label}${opt}</label>`;
    if (f.type === 'text') {
      const inp = document.createElement('input');
      inp.type = 'text'; inp.placeholder = f.ph || ''; inp.dataset.id = f.id;
      inp.value = formData[f.id] || '';
      container.appendChild(div);
      div.appendChild(inp);
    } else if (f.type === 'area') {
      const ta = document.createElement('textarea');
      ta.placeholder = f.ph || ''; ta.dataset.id = f.id;
      ta.value = formData[f.id] || '';
      container.appendChild(div);
      div.appendChild(ta);
    } else if (f.type === 'radio') {
      const rg = document.createElement('div'); rg.className = 'radio-group';
      for (const o of f.opts) {
        const opt = document.createElement('div');
        opt.className = 'radio-opt' + (formData[f.id] === o ? ' selected' : '');
        opt.dataset.id = f.id; opt.dataset.val = o;
        opt.innerHTML = `<div class="radio-dot"></div><span>${o}</span>`;
        opt.onclick = function() {
          document.querySelectorAll(`.radio-opt[data-id="${f.id}"]`).forEach(el => el.classList.remove('selected'));
          this.classList.add('selected');
          formData[f.id] = this.dataset.val;
        };
        rg.appendChild(opt);
      }
      div.appendChild(rg); container.appendChild(div);
    } else if (f.type === 'pills') {
      const pg = document.createElement('div'); pg.className = 'pill-group';
      const sel = formData[f.id] || [];
      for (const o of f.opts) {
        const pill = document.createElement('div');
        pill.className = 'pill' + (sel.includes(o) ? ' selected' : '');
        pill.textContent = o; pill.dataset.id = f.id; pill.dataset.val = o;
        pill.onclick = function() {
          this.classList.toggle('selected');
          const cur = formData[f.id] || [];
          if (this.classList.contains('selected')) { if (!cur.includes(o)) cur.push(o); }
          else { const i = cur.indexOf(o); if (i > -1) cur.splice(i,1); }
          formData[f.id] = cur;
        };
        pg.appendChild(pill);
      }
      div.appendChild(pg); container.appendChild(div);
    } else if (f.type === 'pills2') {
      if (f.sublabel) {
        const sub = document.createElement('span');
        sub.className = 'field-sublabel';
        sub.textContent = f.sublabel;
        div.appendChild(sub);
      }
      const pg2 = document.createElement('div'); pg2.className = 'pills2-group';
      const sel2 = Array.isArray(formData[f.id]) ? formData[f.id] : (formData[f.id] ? [formData[f.id]] : []);
      for (const o of f.opts) {
        const opt = document.createElement('div');
        opt.className = 'pills2-opt' + (sel2.includes(o) ? ' selected' : '');
        opt.textContent = o; opt.dataset.id = f.id; opt.dataset.val = o;
        opt.onclick = function() {
          const cur = Array.isArray(formData[f.id]) ? [...formData[f.id]] : (formData[f.id] ? [formData[f.id]] : []);
          if (this.classList.contains('selected')) {
            const i = cur.indexOf(o); if (i > -1) cur.splice(i,1);
            this.classList.remove('selected');
          } else {
            if (cur.length >= 2) return; // max 2
            cur.push(o);
            this.classList.add('selected');
          }
          formData[f.id] = cur;
          // Disabilita le non selezionate se siamo a 2
          pg2.querySelectorAll('.pills2-opt').forEach(el => {
            const val = el.dataset.val;
            if (!cur.includes(val)) {
              el.classList.toggle('disabled', cur.length >= 2);
            }
          });
        };
        pg2.appendChild(opt);
      }
      div.appendChild(pg2); container.appendChild(div);
    } else if (f.type === 'file') {
      const fileId = f.id;
      const existingFile = fileData[fileId];
      const area = document.createElement('div');
      area.className = 'file-upload-area' + (existingFile ? ' has-file' : '');
      area.innerHTML = `<span class="file-upload-icon">${existingFile ? '📄' : '📎'}</span>
        <div class="file-upload-text">
          ${existingFile
            ? `<strong>${existingFile.name}</strong> caricato`
            : '<strong>Clicca per caricare</strong> un PDF o un\'immagine'}
        </div>`;
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = '.pdf,image/*'; inp.className = 'file-upload-input';
      inp.dataset.id = fileId;
      inp.onchange = async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const base64 = ev.target.result.split(',')[1];
          fileData[fileId] = { data: base64, mediaType: file.type, name: file.name };
          area.className = 'file-upload-area has-file';
          area.querySelector('.file-upload-icon').textContent = '📄';
          area.querySelector('.file-upload-text').innerHTML = `<strong>${file.name}</strong> caricato`;
        };
        reader.readAsDataURL(file);
      };
      area.onclick = () => inp.click();
      div.appendChild(area);
      div.appendChild(inp);
      container.appendChild(div);
    }
  }
}

// ── NAVIGATION ──────────────────────────────────────────────────────────────
function saveCurrentStep() {
  document.querySelectorAll('#stepFields [data-id]').forEach(el => {
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
      formData[el.dataset.id] = el.value.trim();
    }
  });
}

function showView(id) {
  ['welcomeView','wizardView','loadingView','resultsView'].forEach(v => {
    document.getElementById(v).style.display = v === id ? (v === 'resultsView' ? 'flex' : 'flex') : 'none';
  });
  if (id === 'resultsView') document.getElementById('resultsView').style.display = 'block';
}

function startWizard() {
  step = 0;
  document.getElementById('stepBar').style.display = 'flex';
  updateStepBar(0);
  loadStep();
  showView('wizardView');
}

function loadStep() {
  const s = STEPS[step];
  document.getElementById('stepTitle').textContent = s.title;
  document.getElementById('stepSub').textContent = s.sub;
  renderFields(s.fields);
  document.getElementById('btnBack').style.visibility = step === 0 ? 'hidden' : 'visible';
  document.getElementById('btnNext').textContent = step === STEPS.length - 1 ? 'Genera la strategia →' : 'Avanti →';
  updateStepBar(step);
}

function nextStep() {
  saveCurrentStep();
  if (step < STEPS.length - 1) {
    step++;
    loadStep();
    document.querySelector('.view#wizardView').scrollTop = 0;
  } else {
    generate();
  }
}

function prevStep() {
  saveCurrentStep();
  if (step > 0) { step--; loadStep(); }
}

function resetAll() {
  Object.keys(formData).forEach(k => delete formData[k]);
  Object.keys(fileData).forEach(k => delete fileData[k]);

async function callAPIWithTools(messages, systemPrompt, tools = [], maxTokens = 6000) {
  let msgs = [...messages];
  let finalData = null;

  for (let turn = 0; turn < 6; turn++) {
    const body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: msgs
    };
    if (tools.length) body.tools = tools;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    finalData = data;

    if (data.stop_reason !== 'tool_use') break;

    // Continua il loop per tool_use (web search server-side)
    msgs.push({ role: 'assistant', content: data.content });
    const toolResults = data.content
      .filter(b => b.type === 'tool_use')
      .map(b => ({ type: 'tool_result', tool_use_id: b.id, content: 'done' }));
    msgs.push({ role: 'user', content: toolResults });
  }
  return finalData;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function pullBlock(str, open, close) {
  const si = str.indexOf(open);
  if (si === -1) return null;
  const ei = str.indexOf(close, si + open.length);
  if (ei === -1) return null;
  return { content: str.substring(si + open.length, ei).trim(), full: str.substring(si, ei + close.length) };
}

function renderResults(raw) {

  if (pb) { try { pillars = JSON.parse(pb.content); } catch(e) {} text = text.replace(pb.full,''); }

  // Extract MATRIX
  const mb = pullBlock(text, '[MATRIX]', '[/MATRIX]');
  let matrixData = null;

  // Extract CALENDAR

function renderMatrix(d) {
  const pilastri = d.pilastri || [];
  const celle = d.celle || [];
  const objs = ['posizionamento','autorevolezza','educazione','conversione'];
  let t = '<table class="matrix-table"><thead><tr><th></th>';
  for (const p of pilastri) t += `<th>${esc(p)}</th>`;
  t += '</tr></thead><tbody>';
  for (const obj of objs) {
    const info = OMAP[obj];
    t += `<tr><td class="row-label"><div class="row-label-inner"><span class="row-dot" style="background:${info.dot}"></span>${obj.charAt(0).toUpperCase()+obj.slice(1)}</div></td>`;
    for (const p of pilastri) {
      const cell = celle.find(c => c.pilastro === p && c.obiettivo === obj);
      t += cell
        ? `<td class="m-cell c-${info.cls}"><span class="m-badge">${info.badge}</span><div class="m-title">${esc(cell.titolo)}</div></td>`
        : '<td></td>';
    }
    t += '</tr>';
  }
  return t + '</tbody></table>';
}

function renderCalendar(d) {
  const giorni = ['Lun','Mar','Mer','Gio','Ven'];
  let t = '';
  if (d.nota) t += `<div class="cal-nota">${esc(d.nota)}</div>`;
  t += '<table class="calendar-table"><thead><tr><th></th>';
  for (const g of giorni) t += `<th>${g}</th>`;
  t += '</tr></thead><tbody>';
  (d.settimane||[]).forEach((sett,i) => {
    t += `<tr><td class="week-label">Sett.&nbsp;${i+1}</td>`;
    const byDay = {};
    for (const s of sett) byDay[s.giorno] = s;
    for (const g of giorni) {
      const slot = byDay[g];
      if (slot) {
        const info = OMAP[slot.obiettivo] || {badge:'?',cls:'pos'};
        t += `<td class="m-cell c-${info.cls}"><span class="m-badge">${info.badge}</span><div class="m-sub">${esc(slot.pilastro||'')}</div><div class="m-title">${esc(slot.titolo||'')}</div></td>`;
      } else t += '<td></td>';
    }
    t += '</tr>';
  });
  return t + '</tbody></table>';
}

      <div class="post-output-label">${esc(platform)} · ${esc(format)} · ${esc(cell.titolo)}</div>
      <button class="copy-btn" onclick="copyPost(this,'postText${s}')">Copia</button>
      <div id="postText${s}" style="white-space:pre-wrap">${esc(postText)}</div>
      ${visualTip ? `<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
        <div style="font-family:'Rubik Mono One',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--slate);margin-bottom:6px">Formato visual</div>
        <div style="font-family:'Lora',serif;font-size:13px;color:var(--text-secondary);font-style:italic;line-height:1.65">${esc(visualTip)}</div>
      </div>` : ''}
    </div>`;
  } catch(e) {
    output.innerHTML = `<div class="post-output" style="color:var(--text-muted)">Errore: ${e.message}</div>`;
  }
  btn.disabled = false;
}

function copyPost(btn, textId) {
  const text = document.getElementById(textId || 'postText')?.innerText || '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copiato!';
    setTimeout(() => btn.textContent = 'Copia', 2000);
  });
}

// ── CSV EXPORT ───────────────────────────────────────────────────────────────
function toCSV(rows) {
  return rows.map(r => r.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(',')).join('\n');
}

function downloadCSV(filename, content) {
  const bom = '\uFEFF';
  const blob = new Blob([bom + content], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename;
  a.click(); URL.revokeObjectURL(url);
}

function exportMatrix() {
  const mat = window._estrategia?.matrixData;
  if (!mat) return;
  const objs = ['posizionamento','autorevolezza','educazione','conversione'];
  const rows = [['Obiettivo','Pilastro','Idea contenuto']];
  for (const obj of objs) {
    for (const c of (mat.celle||[]).filter(c => c.obiettivo === obj)) {
      rows.push([obj.charAt(0).toUpperCase()+obj.slice(1), c.pilastro, c.titolo]);
    }
  }
  downloadCSV('matrice-editoriale.csv', toCSV(rows));
}

function exportCalendar(cal) {
  const data = cal || window._estrategia?.calData;
  if (!data) return;
  const rows = [['Settimana','Giorno','Obiettivo','Pilastro','Idea contenuto']];
  (data.settimane||[]).forEach((sett, i) => {
    for (const slot of sett) {
      rows.push(['Settimana '+(i+1), slot.giorno, slot.obiettivo.charAt(0).toUpperCase()+slot.obiettivo.slice(1), slot.pilastro, slot.titolo]);
    }
  });
  downloadCSV('calendario-editoriale.csv', toCSV(rows));
}
